<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body, html {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>

<body>

<script>
AFRAME.registerComponent('touch-rotate', {
  init: function () {
    this.startX = 0;
    this.startY = 0;
    this.rot = this.el.getAttribute('rotation');

    this.el.sceneEl.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        this.startX = e.touches[0].pageX;
        this.startY = e.touches[0].pageY;
      }
    });

    this.el.sceneEl.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {

        let dx = e.touches[0].pageX - this.startX;
        let dy = e.touches[0].pageY - this.startY;

        this.startX = e.touches[0].pageX;
        this.startY = e.touches[0].pageY;

        this.rot.y += dx * 0.5;
        this.rot.x += dy * 0.5;

        this.el.setAttribute('rotation', this.rot);
      }
    });
  }
});
</script>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">

  <a-entity position="0 0.3 0" scale="7 7 7">

    <a-gltf-model
      src="scene.glb"
      rotation="0 180 0"
      touch-rotate
    ></a-gltf-model>

  </a-entity>

</a-entity>

</a-scene>

</body>
</html>
