<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
    }

    button {
      padding: 10px;
      margin-right: 5px;
    }
  </style>
</head>

<body>

<div id="ui">
  <button onclick="enterVR()">ENTER VR</button>
</div>

<a-scene

  id="scene"
  webxr="optionalFeatures: local-floor, bounded-floor;"
  vr-mode-ui="enabled: true"
  device-orientation-permission-ui="enabled: true"

  vr-render-mode="stereo"

  renderer="antialias: true"

  cursor="rayOrigin: mouse"

>
  <!-- CAMERA -->
  <a-entity id="rig" position="0 0 0">
    <a-camera id="camera" position="1 1.3 -1" look-controls wasd-controls></a-camera>
  </a-entity>

  <!-- 💡 LIGHT (SOFT CINEMATIC, TIDAK TERLALU TERANG) -->
  <a-light type="ambient" intensity="0.6" color="#ffd2b3"></a-light>
  <a-light type="directional" intensity="0.7" position="2 4 2" color="#ffbfa0"></a-light>
  <a-entity light="type: spot; intensity: 0.8; angle: 35; penumbra: 0.6" position="0 4 2" rotation="-90 0 0"></a-entity>

  <!-- 🌅 SKY SENJA SOFT -->
  <a-sky color="#7a4f3d"></a-sky>

  <!-- 🧱 FLOOR -->
  <a-plane rotation="-90 0 0" width="20" height="20" color="#1f1f1f"></a-plane>

  <!-- 🔧 MAIN PRODUCT -->
  <a-entity position="0 0.5 0" scale="5 5 5">
    <a-gltf-model src="scene.glb" rotation="0 180 0"></a-gltf-model>
  </a-entity>

</a-scene>

<script>
let rig = document.querySelector('#rig');
let walking = false;

// masuk VR
async function enterVR() {

  const scene = document.querySelector('#scene');

  // iOS gyro permission
  if (
    typeof DeviceOrientationEvent !== "undefined" &&
    typeof DeviceOrientationEvent.requestPermission === "function"
  ) {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();

      if (permission !== "granted") {
        return;
      }
    } catch (e) {
      console.log(e);
    }
  }

  scene.enterVR();
}

// 🔥 ANDROID VR TOUCH FIX
window.addEventListener(
  "touchstart",
  function () {
    walking = true;
  },
  true
);

window.addEventListener(
  "touchend",
  function () {
    walking = false;
  },
  true
);

// 🔥 FORCE WALK IN VR MODE
function moveForward() {

  if (!walking) return;

  const pos = rig.object3D.position;

  const cam = document.querySelector("#camera");

  const dir = new THREE.Vector3();

  cam.object3D.getWorldDirection(dir);

  pos.x -= dir.x * 0.08;
  pos.z -= dir.z * 0.08;
}

// 🔥 LOOP
function animate() {

  moveForward();

  requestAnimationFrame(animate);
}

animate();

// 🔥 FIX CANVAS TOUCH IN ANDROID VR
document.querySelector('a-scene').addEventListener('renderstart', () => {

  const canvas = document.querySelector('canvas');

  if (canvas) {

    canvas.style.pointerEvents = "auto";
    canvas.style.touchAction = "none";

    canvas.addEventListener("touchstart", () => {
      walking = true;
    }, true);

    canvas.addEventListener("touchend", () => {
      walking = false;
    }, true);
  }
});
</script>

</body>
</html>
