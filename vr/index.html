<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <!-- FULLSCREEN MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      touch-action: none;
    }

    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
    }

    button {
      padding: 10px;
      margin-right: 5px;
    }

    a-scene {
      position: fixed !important;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>

<div id="ui">
  <button onclick="enterVR()">ENTER VR</button>
</div>

<a-scene

  id="scene"
  webxr="optionalFeatures: local-floor, bounded-floor;"
  vr-mode-ui="enabled: true"
  device-orientation-permission-ui="enabled: true"

>

  <!-- CAMERA -->
  <a-entity id="rig" position="0 0 0">

    <!-- 🔥 ANDROID + IOS GYRO FIX -->
    <a-camera
      id="camera"
      position="1 1.3 -1"
      look-controls="touchEnabled: true; magicWindowTrackingEnabled: true;"
      wasd-controls-enabled="false">
    </a-camera>

  </a-entity>

  <!-- 💡 LIGHT -->
  <a-light type="ambient" intensity="0.6" color="#ffd2b3"></a-light>
  <a-light type="directional" intensity="0.7" position="2 4 2" color="#ffbfa0"></a-light>
  <a-entity light="type: spot; intensity: 0.8; angle: 35; penumbra: 0.6" position="0 4 2" rotation="-90 0 0"></a-entity>

  <!-- 🌅 SKY -->
  <a-sky color="#7a4f3d"></a-sky>

  <!-- 🧱 FLOOR -->
  <a-plane rotation="-90 0 0" width="20" height="20" color="#1f1f1f"></a-plane>

  <!-- 🔧 MAIN PRODUCT -->
  <a-entity position="0 0.5 0" scale="5 5 5">
    <a-gltf-model src="scene.glb" rotation="0 180 0"></a-gltf-model>
  </a-entity>

</a-scene>

<script>
let rig = document.querySelector('#rig');
let walking = false;

// 🔥 ENTER VR + FULLSCREEN + ANDROID GYRO FIX
async function enterVR() {

  // iOS permission
  if (
    typeof DeviceOrientationEvent !== "undefined" &&
    typeof DeviceOrientationEvent.requestPermission === "function"
  ) {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();

      if (permission !== "granted") {
        alert("Gyroscope permission denied");
        return;
      }
    } catch (e) {
      console.log(e);
    }
  }

  // fullscreen
  const el = document.documentElement;

  if (el.requestFullscreen) {
    el.requestFullscreen();
  } else if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen();
  }

  // enter vr
  const scene = document.querySelector('#scene');
  scene.enterVR();
}

// TOUCH CONTROL = JALAN MAJU
document.addEventListener('touchstart', () => {
  walking = true;
});

document.addEventListener('touchend', () => {
  walking = false;
});

// gerakan maju
function tick() {

  if (walking) {

    let pos = rig.getAttribute('position');
    let camera = document.querySelector('#camera');

    let dir = new THREE.Vector3();
    camera.object3D.getWorldDirection(dir);

    pos.x -= dir.x * 0.03;
    pos.z -= dir.z * 0.03;

    rig.setAttribute('position', pos);
  }

  requestAnimationFrame(tick);
}

tick();

// 🔥 FORCE MOBILE RESIZE FIX
window.addEventListener("resize", () => {
  document.body.style.height = window.innerHeight + "px";
});
</script>

</body>
</html>
